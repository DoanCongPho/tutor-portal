worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Per docs/sad.md §12: rate limit on upload and search endpoints.
    limit_req_zone $binary_remote_addr zone=upload:10m  rate=10r/m;
    limit_req_zone $binary_remote_addr zone=search:10m  rate=60r/m;

    upstream app_backend {
        server app:8080;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 25M;

        location /api/v1/tutors/search {
            limit_req zone=search burst=20 nodelay;
            proxy_pass         http://app_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location ~ ^/api/v1/(tutors/me/documents|materials)$ {
            limit_req zone=upload burst=5 nodelay;
            proxy_pass         http://app_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass         http://app_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
